services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fepi_contracts
      POSTGRES_USER: fepi
      POSTGRES_PASSWORD: fepi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fepi -d fepi_contracts"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./contract-system-output
    env_file:
      - ./contract-system-output/.env.local
    volumes:
      - ./contract-system-output:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next_cache:
